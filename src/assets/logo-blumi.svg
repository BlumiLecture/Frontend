<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 64 64">
  <!-- Pink circular background -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff76a8"/>
      <stop offset="1" stop-color="#ff4f8b"/>
    </linearGradient>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.25" stdDeviation="1.5" flood-color="#e23b78" flood-opacity=".35"/>
    </filter>
  </defs>
  <circle cx="32" cy="32" r="28" fill="url(#g)" filter="url(#s)"/>
  <!-- Simple book icon -->
  <g transform="translate(12 16)">
    <!-- Book base -->
    <path d="M8 6h16a6 6 0 0 1 6 6v18a2 2 0 0 1-2 2H12a6 6 0 0 0-6 6V12a6 6 0 0 1 6-6z" fill="#ffffff"/>
    <!-- Right page -->
    <path d="M24 6h4a6 6 0 0 1 6 6v18a2 2 0 0 1-2 2h-8V6z" fill="#f7f7ff" opacity=".9"/>
    <!-- Center fold -->
    <rect x="23.25" y="6" width="1.5" height="26" fill="#ffd3e3"/>
    <!-- Bottom shadow -->
    <path d="M6 38c1.5-2.5 5-4 8-4h22c1.1 0 2 .9 2 2v2H6z" fill="#e83d7a" opacity=".2"/>
    <!-- Bookmark -->
    <path d="M16 6v10l3-2 3 2V6z" fill="#ff7fb3"/>
    <!-- Page lines -->
    <path d="M12 14h8M12 18h8M12 22h8" stroke="#ffd3e3" stroke-width="1.25" stroke-linecap="round"/>
  </g>
</svg>

